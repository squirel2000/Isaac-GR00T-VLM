# =============================================================================
# Single source of truth for the VLM LoRA flow (paths + hyperparameters).
#
# HOW TO USE:
#   - Edit values here to plan a run. The pipeline commands take the SAME names
#     as CLI flags (e.g. --lora-r, --max-steps) or as env vars in
#     examples/finetune_cosmos_r2_lora.sh (LORA_R, MAX_STEPS, ...); CLI/env override.
#   - FINE-TUNE uses: models.base_vlm + teacher_vlm, data.*, lora.*, train.*  (steps 1-2)
#   - MERGE/SWAP uses: products.lora_tuned_vlm, products.swapped_vla, vla.baseline_ckpt (steps 3-4)
#   - EVAL uses: data.lerobot_dataset (open-loop), artifacts.vqa/data.val.jsonl (VQA)  (step 5)
#   H100 paths shown; local→H100 via `python scripts/common/pegasus.py run "<cmd>"`.
# =============================================================================

models:
  base_vlm: nvidia/Cosmos-Reason2-2B            # gated -> uses local HF cache (resolve_model_path)
  teacher_vlm: Qwen/Qwen3-VL-30B-A3B-Instruct   # VQA auto-gen teacher (MoE, ~31B/3B active)
  teacher_vlm_compare: Qwen/Qwen3-VL-8B-Instruct # dense baseline for the teacher comparison

remote:
  repo: /data/VLA/tingying/Isaac-GR00T-VLM       # this repo on H100 (renamed from vlm_lora_finetune)
  n1d7_repo: /data/VLA/tingying/IsaacLab-GR00T/Isaac-GR00T_n1d7
  isaaclab_root: /data/VLA/tingying/IsaacLab-GR00T
  gr00t_ckpts: /data/VLA/tingying/IsaacLab-GR00T/artifacts/checkpoints/gr00t

data:
  lerobot_dataset: /data/VLA/datasets/OpenArm_CanSorting_MultiTask_dataset_O6_0403
  vqa_out: artifacts/vqa
  num_episodes: 100
  frames_per_episode: 3
  val_ratio: 0.1

# --- Product locations (canonical, under IsaacLab-GR00T/artifacts/checkpoints/gr00t) ---
products:
  # Product A: LoRA-tuned standalone VLM (deployable, no GR00T dependency)
  lora_tuned_vlm: /data/VLA/tingying/IsaacLab-GR00T/artifacts/checkpoints/gr00t/lora_tuned_vlm/Cosmos-Reason2-2B-lora-merged
  # Product B: GR00T N1.7 VLA with the VLM backbone swapped
  swapped_vla: /data/VLA/tingying/IsaacLab-GR00T/artifacts/checkpoints/gr00t/swapped_checkpoints/N1_7_cosmosR2lora_swapped

vla:
  baseline_ckpt: /data/VLA/tingying/IsaacLab-GR00T/artifacts/checkpoints/gr00t/N1_7_fft_0614_150k_lr1e4_no_tune_visual
  # alt baseline: N1_7_fft_0614_150k_lr5e5_no_tune_visual

# --- repo-local artifacts (stay inside Isaac-GR00T-VLM) ---
artifacts:
  base_snapshot: artifacts/Cosmos-Reason2-2B-base   # pre-finetune VLM reference
  adapter: artifacts/cosmos_r2_lora                 # trained PEFT adapter (pre-merge)
  vqa: artifacts/vqa                                # generated VQA dataset
  eval: artifacts/eval                              # eval plots / metrics

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target: llm            # 'llm' | 'all-linear' | 'q_proj,v_proj,...'
  on_vision: false

train:
  max_steps: 2000
  learning_rate: 1e-4
  per_device_batch_size: 1
  gradient_accumulation_steps: 8
  warmup_ratio: 0.05
  max_seq_len: 2048
  save_steps: 500
  optim: adamw_torch
  gradient_checkpointing: true
  bf16: true
